<svg xmlns="http://www.w3.org/2000/svg" width="220" height="250" fill="none" viewBox="17 3 220 250">
  <style>
    @keyframes revealUp {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes subtlePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    .piece {
      opacity: 0;
      animation: revealUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .piece-1 { animation-delay: 0s; }
    .piece-2 { animation-delay: 0.25s; }
    .piece-3 { animation-delay: 0.5s; }
    .piece-4 { animation-delay: 0.75s; }
    .piece-4 {
      animation: revealUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.75s forwards,
                 subtlePulse 3s ease-in-out 1.8s infinite;
    }
    .piece-1, .piece-2, .piece-3 {
      animation: revealUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards,
                 subtlePulse 3s ease-in-out 1.8s infinite;
    }
    .piece-1 { animation-delay: 0s, 1.8s; }
    .piece-2 { animation-delay: 0.25s, 2.05s; }
    .piece-3 { animation-delay: 0.5s, 2.3s; }
    .piece-4 { animation-delay: 0.75s, 2.55s; }
  </style>

