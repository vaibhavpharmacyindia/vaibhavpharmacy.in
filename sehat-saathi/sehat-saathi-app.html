<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1b5e20" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sehat Saathi" />
  <title>Sehat Saathi — सेहत साथी</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #e8f5e9;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }
    .loading-msg {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; font-size: 18px; color: #1b5e20; font-weight: 600;
      flex-direction: column; gap: 12px;
    }
    .loading-msg .spinner {
      width: 32px; height: 32px; border: 3px solid #c8e6c9;
      border-top-color: #1b5e20; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { color: #c62828; background: #ffebee; padding: 20px; margin: 20px;
      border-radius: 12px; font-size: 14px; line-height: 1.5; }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-msg">
      <div class="spinner"></div>
      <div>Loading Sehat Saathi...</div>
      <div style="font-size: 12px; color: #888;">Requires internet for first load</div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"
    onerror="document.getElementById('root').innerHTML='<div class=error-msg>Failed to load React. Please check your internet connection and reload.</div>'"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    onerror="document.getElementById('root').innerHTML='<div class=error-msg>Failed to load ReactDOM. Please check your internet connection and reload.</div>'"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"
    onerror="document.getElementById('root').innerHTML='<div class=error-msg>Failed to load Babel. Please check your internet connection and reload.</div>'"></script>

  <script type="text/babel" data-type="module">
const { useState, useEffect, useCallback, useRef } = React;

// ═══════════════════════════════════════════════════════════════
//  SEHAT SAATHI — सेहत साथी
//  Gamified Medicine Reminder App by Vaibhav Pharmacy
// ═══════════════════════════════════════════════════════════════

// ── Gamification Constants ─────────────────────────────────────
const XP_TAKE_MED = 10;
const XP_STREAK_BONUS = 5;        // per consecutive day
const XP_PERFECT_DAY = 25;        // all meds taken in a day
const XP_ADD_MEDICINE = 15;
const LEVELS = [
  { level: 1, xp: 0, title: "Beginner", titleHi: "शुरुआत", emoji: "🌱" },
  { level: 2, xp: 50, title: "Health Starter", titleHi: "स्वास्थ्य शुरुआत", emoji: "🌿" },
  { level: 3, xp: 150, title: "Med Warrior", titleHi: "दवाई योद्धा", emoji: "💪" },
  { level: 4, xp: 300, title: "Wellness Pro", titleHi: "तंदुरुस्ती प्रो", emoji: "⭐" },
  { level: 5, xp: 500, title: "Health Champion", titleHi: "स्वास्थ्य चैंपियन", emoji: "🏆" },
  { level: 6, xp: 800, title: "Sehat Master", titleHi: "सेहत मास्टर", emoji: "👑" },
  { level: 7, xp: 1200, title: "Legendary", titleHi: "दिग्गज", emoji: "🌟" },
];
const BADGES = [
  { id: "first_med", icon: "💊", name: "First Step", desc: "Added your first medicine", condition: (s) => s.totalMedsAdded >= 1 },
  { id: "streak_3", icon: "🔥", name: "3-Day Streak", desc: "3 days without missing", condition: (s) => s.streak >= 3 },
  { id: "streak_7", icon: "🔥", name: "Week Warrior", desc: "7-day streak!", condition: (s) => s.streak >= 7 },
  { id: "streak_30", icon: "🏅", name: "Monthly Master", desc: "30-day streak!", condition: (s) => s.streak >= 30 },
  { id: "perfect_day_1", icon: "✨", name: "Perfect Day", desc: "Took all meds on time", condition: (s) => s.perfectDays >= 1 },
  { id: "perfect_day_7", icon: "🌟", name: "Perfect Week", desc: "7 perfect days", condition: (s) => s.perfectDays >= 7 },
  { id: "xp_100", icon: "💎", name: "Century", desc: "Earned 100 XP", condition: (s) => s.xp >= 100 },
  { id: "xp_500", icon: "👑", name: "Half K", desc: "Earned 500 XP", condition: (s) => s.xp >= 500 },
  { id: "meds_5", icon: "📋", name: "Organized", desc: "Managing 5+ medicines", condition: (s) => s.totalMedsAdded >= 5 },
  { id: "adherence_90", icon: "🎯", name: "On Target", desc: "90%+ adherence rate", condition: (s) => s.adherenceRate >= 90 },
];

const FREQUENCY_OPTIONS = [
  { id: "od", code: "OD", label: "Once a day", labelHi: "दिन में 1 बार", times: ["08:00"], emoji: "1️⃣" },
  { id: "bd", code: "BD", label: "Twice a day", labelHi: "दिन में 2 बार", times: ["08:00", "20:00"], emoji: "2️⃣" },
  { id: "tds", code: "TDS", label: "Three times a day", labelHi: "दिन में 3 बार", times: ["08:00", "14:00", "20:00"], emoji: "3️⃣" },
  { id: "qds", code: "QDS", label: "Four times a day", labelHi: "दिन में 4 बार", times: ["06:00", "12:00", "18:00", "22:00"], emoji: "4️⃣" },
  { id: "hs", code: "HS", label: "At bedtime", labelHi: "सोने से पहले", times: ["22:00"], emoji: "🌙" },
  { id: "prn", code: "SOS", label: "As needed", labelHi: "जरूरत पर", times: [], emoji: "🆘" },
  { id: "q6h", code: "Q6H", label: "Every 6 hours", labelHi: "हर 6 घंटे", times: ["06:00", "12:00", "18:00", "00:00"], emoji: "🔄" },
  { id: "q8h", code: "Q8H", label: "Every 8 hours", labelHi: "हर 8 घंटे", times: ["06:00", "14:00", "22:00"], emoji: "🔄" },
  { id: "q12h", code: "Q12H", label: "Every 12 hours", labelHi: "हर 12 घंटे", times: ["08:00", "20:00"], emoji: "🔄" },
  { id: "eod", code: "EOD", label: "Every other day", labelHi: "एक दिन छोड़कर", times: ["08:00"], emoji: "📅" },
  { id: "weekly", code: "QW", label: "Once a week", labelHi: "हफ्ते में 1 बार", times: ["08:00"], emoji: "📆" },
  { id: "stat", code: "STAT", label: "Immediately / once", labelHi: "तुरंत / एक बार", times: [], emoji: "⚡" },
];

const FOOD_OPTIONS = [
  { id: "before", label: "Before food", labelHi: "खाने से पहले", emoji: "🍽️" },
  { id: "after", label: "After food", labelHi: "खाने के बाद", emoji: "🍛" },
  { id: "any", label: "Anytime", labelHi: "कभी भी", emoji: "⏰" },
];

const MED_TYPES = [
  { id: "tablet", label: "Tablet", emoji: "💊" },
  { id: "capsule", label: "Capsule", emoji: "💊" },
  { id: "syrup", label: "Syrup", emoji: "🧴" },
  { id: "injection", label: "Injection", emoji: "💉" },
  { id: "drops", label: "Drops", emoji: "💧" },
  { id: "cream", label: "Cream", emoji: "🧴" },
  { id: "inhaler", label: "Inhaler", emoji: "🫁" },
];

// ── Helper ─────────────────────────────────────────────────────
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const formatTime = (t) => { const [h, m] = t.split(":"); const hr = parseInt(h); const h12 = hr === 0 ? 12 : hr > 12 ? hr - 12 : hr; return `${h12}:${m} ${hr >= 12 ? "PM" : "AM"}`; };
const today = () => new Date().toISOString().split("T")[0];

// ── Persist to localStorage ───────────────────────────────────
const STORAGE_KEY = "sehat_saathi_data";
const DEFAULT_DB = { medicines: [], logs: [], stats: { xp: 0, streak: 0, perfectDays: 0, totalMedsAdded: 0, adherenceRate: 100, totalTaken: 0, totalDue: 0 }, badges: [], userName: "" };

function loadDB() {
  try {
    const saved = window.localStorage.getItem(STORAGE_KEY);
    if (saved) return { ...DEFAULT_DB, ...JSON.parse(saved) };
  } catch (e) { /* ignore */ }
  return { ...DEFAULT_DB };
}

function saveDB(db) {
  try { window.localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch (e) { /* ignore */ }
}

let DB = loadDB();

function getLevel(xp) {
  let lvl = LEVELS[0];
  for (const l of LEVELS) { if (xp >= l.xp) lvl = l; else break; }
  const nextLvl = LEVELS.find((l) => l.xp > xp);
  const progress = nextLvl ? (xp - lvl.xp) / (nextLvl.xp - lvl.xp) : 1;
  return { ...lvl, progress, nextXp: nextLvl?.xp || lvl.xp };
}

// ═══════════════════════════════════════════════════════════════
//  MAIN APP
// ═══════════════════════════════════════════════════════════════
function SehatSaathi() {
  const [screen, setScreen] = useState("splash");
  const [medicines, setMedicines] = useState(DB.medicines);
  const [logs, setLogs] = useState(DB.logs);
  const [stats, setStats] = useState(DB.stats);
  const [badges, setBadges] = useState(DB.badges);
  const [userName, setUserName] = useState(DB.userName);
  const [toast, setToast] = useState(null);
  const [xpAnim, setXpAnim] = useState(null);
  const [newBadge, setNewBadge] = useState(null);
  const [activeReminders, setActiveReminders] = useState([]);
  const reminderInterval = useRef(null);
  const badgesRef = useRef(badges);

  // ── Toast notification ────────────────────────────────────
  const showToast = useCallback((msg, duration = 2500) => {
    setToast(msg);
    setTimeout(() => setToast(null), duration);
  }, []);

  // ── XP animation ──────────────────────────────────────────
  const animateXP = useCallback((amount) => {
    setXpAnim(`+${amount} XP`);
    setTimeout(() => setXpAnim(null), 1500);
  }, []);

  // Keep badgesRef in sync
  useEffect(() => { badgesRef.current = badges; }, [badges]);

  // ── Check & award badges ──────────────────────────────────
  const checkBadges = useCallback((newStats) => {
    const currentBadges = badgesRef.current;
    const earned = [];
    for (const badge of BADGES) {
      if (!currentBadges.includes(badge.id) && badge.condition(newStats)) {
        earned.push(badge);
      }
    }
    if (earned.length > 0) {
      const newBadgeIds = [...currentBadges, ...earned.map((b) => b.id)];
      setBadges(newBadgeIds);
      DB.badges = newBadgeIds; saveDB(DB);
      setNewBadge(earned[0]);
      setTimeout(() => setNewBadge(null), 3000);
    }
  }, []);

  // ── Add XP ────────────────────────────────────────────────
  const addXP = useCallback((amount) => {
    setStats((prev) => {
      const newStats = { ...prev, xp: prev.xp + amount };
      DB.stats = newStats; saveDB(DB);
      setTimeout(() => checkBadges(newStats), 500);
      return newStats;
    });
    animateXP(amount);
  }, [animateXP, checkBadges]);

  // ── Add medicine ──────────────────────────────────────────
  const addMedicine = useCallback((med) => {
    const newMed = { ...med, id: uid(), createdAt: today() };
    const updated = [...medicines, newMed];
    setMedicines(updated);
    DB.medicines = updated; saveDB(DB);
    setStats((prev) => {
      const newStats = { ...prev, totalMedsAdded: prev.totalMedsAdded + 1 };
      DB.stats = newStats; saveDB(DB);
      return newStats;
    });
    addXP(XP_ADD_MEDICINE);
    showToast("💊 Medicine added! +15 XP");
  }, [medicines, addXP, showToast]);

  // ── Delete medicine ───────────────────────────────────────
  const deleteMedicine = useCallback((id) => {
    const updated = medicines.filter((m) => m.id !== id);
    setMedicines(updated);
    DB.medicines = updated; saveDB(DB);
    showToast("Medicine removed");
  }, [medicines, showToast]);

  // ── Mark dose taken / skipped ─────────────────────────────
  const markDose = useCallback((medId, time, status) => {
    const log = { medId, time, status, date: today(), timestamp: Date.now() };
    const updated = [...logs, log];
    setLogs(updated);
    DB.logs = updated; saveDB(DB);

    // Remove from active reminders
    setActiveReminders((prev) => prev.filter((r) => !(r.medId === medId && r.time === time)));

    if (status === "taken") {
      let xp = XP_TAKE_MED;
      const todayLogs = updated.filter((l) => l.date === today() && l.status === "taken");
      const todayDue = getTodayDoses(medicines);
      const isPerfect = todayLogs.length >= todayDue.length && todayDue.length > 0;

      // Streak bonus
      xp += Math.min(stats.streak, 10) * XP_STREAK_BONUS;
      if (isPerfect) xp += XP_PERFECT_DAY;

      // Single combined stats update
      setStats((prev) => {
        const newTaken = prev.totalTaken + 1;
        const newDue = prev.totalDue + 1;
        const rate = Math.round((newTaken / newDue) * 100);
        const ns = {
          ...prev,
          totalTaken: newTaken,
          totalDue: newDue,
          adherenceRate: rate,
          perfectDays: isPerfect ? prev.perfectDays + 1 : prev.perfectDays,
        };
        DB.stats = ns; saveDB(DB);
        return ns;
      });

      showToast(isPerfect ? "🌟 PERFECT DAY! +" + xp + " XP" : "✅ Great job! +" + xp + " XP");
      addXP(xp);
    } else {
      setStats((prev) => {
        const newDue = prev.totalDue + 1;
        const rate = newDue > 0 ? Math.round((prev.totalTaken / newDue) * 100) : 0;
        const ns = { ...prev, totalDue: newDue, adherenceRate: rate };
        DB.stats = ns; saveDB(DB);
        return ns;
      });
      showToast("Dose skipped. Try not to miss next time!");
    }
  }, [logs, medicines, stats.streak, addXP, showToast]);

  // ── Get today's due doses ─────────────────────────────────
  function getTodayDoses(meds) {
    const doses = [];
    const now = new Date();
    const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
    const dayOfWeek = now.getDay(); // 0=Sun

    for (const med of meds) {
      const freq = FREQUENCY_OPTIONS.find((f) => f.id === med.frequency);
      if (!freq) continue;
      // EOD: skip on odd/even day based on createdAt
      if (med.frequency === "eod") {
        const created = new Date(med.createdAt || now);
        const createdDay = Math.floor((created - new Date(created.getFullYear(), 0, 0)) / 86400000);
        if ((dayOfYear - createdDay) % 2 !== 0) continue;
      }
      // QW: only on the same weekday as creation
      if (med.frequency === "weekly") {
        const created = new Date(med.createdAt || now);
        if (dayOfWeek !== created.getDay()) continue;
      }
      for (const time of freq.times) {
        const [h, m] = time.split(":").map(Number);
        doses.push({ medId: med.id, medName: med.name, medType: med.type, time, timeMinutes: h * 60 + m, med });
      }
    }

    return doses.sort((a, b) => a.timeMinutes - b.timeMinutes);
  }

  // ── Check for due reminders ───────────────────────────────
  useEffect(() => {
    const check = () => {
      if (medicines.length === 0) return;
      const now = new Date();
      const currentTime = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
      const doses = getTodayDoses(medicines);
      const todayStr = today();

      for (const dose of doses) {
        const alreadyLogged = logs.some((l) => l.medId === dose.medId && l.time === dose.time && l.date === todayStr);
        const alreadyActive = activeReminders.some((r) => r.medId === dose.medId && r.time === dose.time);
        if (!alreadyLogged && !alreadyActive && dose.time === currentTime) {
          setActiveReminders((prev) => [...prev, { ...dose, triggeredAt: Date.now() }]);
          // Try browser notification
          if ("Notification" in window && Notification.permission === "granted") {
            new Notification(`💊 Sehat Saathi`, { body: `Time to take ${dose.medName}!`, icon: "💊" });
          }
        }
      }
    };

    reminderInterval.current = setInterval(check, 30000);
    check(); // Run once immediately
    return () => clearInterval(reminderInterval.current);
  }, [medicines, logs, activeReminders]);

  // ── Request notification permission ───────────────────────
  useEffect(() => {
    if ("Notification" in window && Notification.permission === "default") {
      Notification.requestPermission();
    }
  }, []);

  // ── Streak calculation ────────────────────────────────────
  useEffect(() => {
    if (medicines.length === 0) return;
    let streak = 0;
    const d = new Date();
    // Check today first
    const todayLogs = logs.filter((l) => l.date === today());
    if (todayLogs.length > 0 && todayLogs.every((l) => l.status === "taken")) streak++;

    for (let i = 1; i <= 365; i++) {
      d.setDate(d.getDate() - 1);
      const dateStr = d.toISOString().split("T")[0];
      const dayLogs = logs.filter((l) => l.date === dateStr);
      if (dayLogs.length > 0 && dayLogs.every((l) => l.status === "taken")) {
        streak++;
      } else if (dayLogs.length > 0) {
        // Had logs but some were skipped — streak broken
        break;
      } else {
        // No logs this day — skip (no medicines were due or app wasn't used yet)
        continue;
      }
    }

    setStats((prev) => {
      if (prev.streak === streak) return prev; // no change
      const ns = { ...prev, streak };
      DB.stats = ns; saveDB(DB);
      return ns;
    });
  }, [logs, medicines]);

  // ── Splash screen auto-advance ────────────────────────────
  useEffect(() => {
    if (screen === "splash") {
      setTimeout(() => setScreen(userName ? "home" : "onboarding"), 2000);
    }
  }, [screen, userName]);

  // ── Render ────────────────────────────────────────────────
  const level = getLevel(stats.xp);

  return (
    <div style={{
      maxWidth: 430, margin: "0 auto", minHeight: "100vh", position: "relative",
      fontFamily: "'Segoe UI', system-ui, -apple-system, sans-serif",
      background: "linear-gradient(180deg, #e8f5e9 0%, #f1f8e9 50%, #fff 100%)",
      overflow: "hidden",
    }}>
      {/* Toast */}
      {toast && (
        <div style={{
          position: "fixed", top: 60, left: "50%", transform: "translateX(-50%)", zIndex: 9999,
          background: "#1b5e20", color: "#fff", padding: "12px 24px", borderRadius: 25,
          fontSize: 14, fontWeight: 600, boxShadow: "0 8px 32px rgba(27,94,32,0.3)",
          animation: "slideDown 0.3s ease",
        }}>
          {toast}
        </div>
      )}

      {/* XP Animation */}
      {xpAnim && (
        <div style={{
          position: "fixed", top: "40%", left: "50%", transform: "translate(-50%, -50%)", zIndex: 9999,
          fontSize: 36, fontWeight: 900, color: "#ff6f00",
          textShadow: "0 2px 10px rgba(255,111,0,0.4)",
          animation: "floatUp 1.5s ease forwards", pointerEvents: "none",
        }}>
          {xpAnim}
        </div>
      )}

      {/* New Badge Popup */}
      {newBadge && (
        <div style={{
          position: "fixed", inset: 0, zIndex: 9998, display: "flex", alignItems: "center", justifyContent: "center",
          background: "rgba(0,0,0,0.5)", animation: "fadeIn 0.3s ease",
        }} onClick={() => setNewBadge(null)}>
          <div style={{
            background: "#fff", borderRadius: 24, padding: "32px 40px", textAlign: "center",
            boxShadow: "0 20px 60px rgba(0,0,0,0.3)", animation: "popIn 0.4s ease",
          }}>
            <div style={{ fontSize: 64 }}>{newBadge.icon}</div>
            <div style={{ fontSize: 22, fontWeight: 800, color: "#1b5e20", marginTop: 8 }}>New Badge!</div>
            <div style={{ fontSize: 18, fontWeight: 700, marginTop: 4 }}>{newBadge.name}</div>
            <div style={{ fontSize: 14, color: "#666", marginTop: 4 }}>{newBadge.desc}</div>
          </div>
        </div>
      )}

      {/* Screens */}
      {screen === "splash" && <SplashScreen />}
      {screen === "onboarding" && <OnboardingScreen onComplete={(name) => { setUserName(name); DB.userName = name; saveDB(DB); setScreen("home"); }} />}
      {screen === "home" && (
        <HomeScreen
          userName={userName} stats={stats} level={level} medicines={medicines}
          logs={logs} activeReminders={activeReminders} badges={badges}
          onMarkDose={markDose} onNav={setScreen}
        />
      )}
      {screen === "add" && <AddMedicineScreen onAdd={(med) => { addMedicine(med); setScreen("home"); }} onBack={() => setScreen("home")} />}
      {screen === "medicines" && <MedicineListScreen medicines={medicines} onDelete={deleteMedicine} onBack={() => setScreen("home")} />}
      {screen === "badges" && <BadgesScreen badges={badges} stats={stats} onBack={() => setScreen("home")} />}
      {screen === "schedule" && <ScheduleScreen medicines={medicines} logs={logs} onBack={() => setScreen("home")} />}

      {/* CSS Animations */}
      <style>{`
        @keyframes slideDown { from { opacity:0; transform: translateX(-50%) translateY(-20px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
        @keyframes floatUp { 0% { opacity:1; transform: translate(-50%,-50%) scale(1); } 100% { opacity:0; transform: translate(-50%,-120%) scale(1.5); } }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        @keyframes popIn { from { transform: scale(0.5); opacity:0; } to { transform: scale(1); opacity:1; } }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-4px); } 40% { transform: translateX(4px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
      `}</style>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  SPLASH SCREEN
// ═══════════════════════════════════════════════════════════════
function SplashScreen() {
  return (
    <div style={{
      height: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",

// ═══════════════════════════════════════════════════════════════
//  HOME SCREEN — Dashboard
// ═══════════════════════════════════════════════════════════════
function HomeScreen({ userName, stats, level, medicines, logs, activeReminders, badges, onMarkDose, onNav }) {
  const todayDoses = getTodayDoses(medicines);
  const todayStr = today();
  const doneCount = todayDoses.filter((d) => logs.some((l) => l.medId === d.medId && l.time === d.time && l.date === todayStr)).length;
  const progressPct = todayDoses.length > 0 ? Math.round((doneCount / todayDoses.length) * 100) : 0;
  const circumference = 2 * Math.PI * 52;

  return (
    <div style={{ paddingBottom: 90, minHeight: "100vh", background: "#f5f7f5" }}>
      {/* Header with gradient */}
      <div style={{
        background: "linear-gradient(160deg, #0d3311 0%, #1b5e20 40%, #2e7d32 80%, #388e3c 100%)",
        padding: "24px 20px 60px", position: "relative", overflow: "hidden",
      }}>
        <div style={{ position: "absolute", top: -40, right: -40, width: 180, height: 180, borderRadius: "50%", background: "rgba(255,255,255,0.04)" }} />
        <div style={{ position: "absolute", bottom: 10, left: -30, width: 120, height: 120, borderRadius: "50%", background: "rgba(255,255,255,0.03)" }} />

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", position: "relative", zIndex: 1 }}>
          <div>
            <div style={{ fontSize: 13, color: "#a5d6a7", fontWeight: 500 }}>Namaste 🙏</div>
            <div style={{ fontSize: 26, fontWeight: 900, color: "#fff", marginTop: 2, letterSpacing: -0.5 }}>{userName}</div>
          </div>
          <div style={{
            background: "rgba(255,255,255,0.12)", borderRadius: 14, padding: "8px 14px",
            display: "flex", alignItems: "center", gap: 8, backdropFilter: "blur(8px)",
            border: "1px solid rgba(255,255,255,0.1)",
          }}>
            <span style={{ fontSize: 22 }}>{level.emoji}</span>
            <div>
              <div style={{ fontSize: 10, color: "#a5d6a7", fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>Level {level.level}</div>
              <div style={{ fontSize: 14, fontWeight: 800, color: "#fff" }}>{level.title}</div>
            </div>
          </div>
        </div>

        {/* XP Progress */}
        <div style={{ marginTop: 20, position: "relative", zIndex: 1 }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#81c784", fontWeight: 600 }}>
            <span>{stats.xp} XP</span>
            <span>{level.nextXp} XP</span>
          </div>
          <div style={{ height: 6, background: "rgba(255,255,255,0.12)", borderRadius: 3, marginTop: 5, overflow: "hidden" }}>
            <div style={{
              height: "100%", borderRadius: 3, transition: "width 0.8s cubic-bezier(0.4,0,0.2,1)",
              background: "linear-gradient(90deg, #69f0ae, #fdd835, #ff9800)",
              width: `${level.progress * 100}%`,
            }} />
          </div>
        </div>
      </div>

      {/* Floating Stats Cards — overlapping header */}
      <div style={{ padding: "0 16px", marginTop: -36, position: "relative", zIndex: 2 }}>
        <div style={{
          display: "flex", gap: 10, background: "#fff", borderRadius: 20, padding: 14,
          boxShadow: "0 8px 32px rgba(0,0,0,0.1)",
        }}>
          {[
            { val: stats.streak, label: "Day Streak", color: "#ff6d00", bg: "#fff3e0",
              icon: <svg width="28" height="28" viewBox="0 0 28 28"><path d="M14 2c0 6-5 8-5 14a7 7 0 0014 0c0-4-3-6-3-10-2 3-4 4-6 4V2z" fill="#ff6d00"/></svg> },
            { val: `${stats.adherenceRate}%`, label: "Adherence", color: "#1b5e20", bg: "#e8f5e9",
              icon: <svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="11" fill="none" stroke="#c8e6c9" strokeWidth="3"/><circle cx="14" cy="14" r="11" fill="none" stroke="#43a047" strokeWidth="3" strokeDasharray={`${2*Math.PI*11}`} strokeDashoffset={`${2*Math.PI*11*(1-stats.adherenceRate/100)}`} strokeLinecap="round" transform="rotate(-90 14 14)"/><circle cx="14" cy="14" r="3" fill="#1b5e20"/></svg> },
            { val: BADGES.filter((b) => badges.includes(b.id)).length, label: "Badges", color: "#f9a825", bg: "#fffde7",
              icon: <svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="11" r="8" fill="#fdd835"/><polygon points="14,22 8,28 10,22 4,24 8,18" fill="#f9a825"/><polygon points="14,22 20,28 18,22 24,24 20,18" fill="#f9a825"/><text x="14" y="14" textAnchor="middle" fontSize="10" fill="#f57f17" fontWeight="900">★</text></svg> },
          ].map((s) => (
            <div key={s.label} style={{ flex: 1, textAlign: "center", padding: "8px 4px" }}>
              <div style={{ display: "flex", justifyContent: "center", marginBottom: 6 }}>{s.icon}</div>
              <div style={{ fontSize: 22, fontWeight: 900, color: s.color, lineHeight: 1 }}>{s.val}</div>
              <div style={{ fontSize: 10, color: "#888", fontWeight: 600, marginTop: 4, textTransform: "uppercase", letterSpacing: 0.5 }}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Today's Progress — Large ring card */}
      <div style={{ padding: "16px 16px 0" }}>
        <div style={{
          background: "#fff", borderRadius: 20, padding: "20px 24px",
          boxShadow: "0 2px 16px rgba(0,0,0,0.05)",
          display: "flex", alignItems: "center", gap: 20,
        }}>
          <div style={{ position: "relative", width: 120, height: 120, flexShrink: 0 }}>
            <svg width="120" height="120" viewBox="0 0 120 120">
              <defs>
                <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stopColor="#43a047" />
                  <stop offset="100%" stopColor="#69f0ae" />
                </linearGradient>
              </defs>
              <circle cx="60" cy="60" r="52" fill="none" stroke="#f0f0f0" strokeWidth="10" />
              <circle cx="60" cy="60" r="52" fill="none" stroke="url(#ringGrad)" strokeWidth="10"
                strokeDasharray={circumference}
                strokeDashoffset={circumference * (1 - progressPct / 100)}
                strokeLinecap="round" transform="rotate(-90 60 60)"
                style={{ transition: "stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1)" }}
              />
            </svg>
            <div style={{
              position: "absolute", inset: 0, display: "flex", flexDirection: "column",
              alignItems: "center", justifyContent: "center",
            }}>
              <div style={{ fontSize: 28, fontWeight: 900, color: "#1b5e20" }}>{progressPct}%</div>
              <div style={{ fontSize: 10, color: "#888", fontWeight: 600, marginTop: -2 }}>DONE</div>
            </div>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 18, fontWeight: 800, color: "#1b5e20" }}>Today's Progress</div>
            <div style={{ fontSize: 13, color: "#888", marginTop: 4 }}>{doneCount} of {todayDoses.length} doses completed</div>
            {progressPct === 100 && todayDoses.length > 0 && (
              <div style={{
                marginTop: 8, padding: "6px 12px", background: "linear-gradient(135deg, #fff3e0, #fff8e1)",
                borderRadius: 10, display: "inline-block", fontSize: 13, fontWeight: 800, color: "#e65100",
              }}>🌟 Perfect Day!</div>
            )}
            {progressPct > 0 && progressPct < 100 && (
              <div style={{ marginTop: 8 }}>
                <div style={{ height: 4, background: "#f0f0f0", borderRadius: 2, overflow: "hidden" }}>
                  {todayDoses.map((_, i) => (
                    <div key={i} style={{
                      width: `${100 / todayDoses.length}%`, height: "100%", display: "inline-block",
                      background: i < doneCount ? "#43a047" : "transparent",
                    }} />
                  ))}
                </div>
                <div style={{ fontSize: 10, color: "#aaa", marginTop: 3 }}>{todayDoses.length - doneCount} remaining</div>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Active Reminders */}
      {activeReminders.length > 0 && (
        <div style={{ padding: "16px 16px 0" }}>
          {activeReminders.map((r) => (
            <div key={r.medId + r.time} style={{
              background: "#fff", borderRadius: 20, padding: 18, marginBottom: 10,
              boxShadow: "0 2px 16px rgba(255,152,0,0.12)", animation: "shake 0.5s ease",
              borderLeft: "5px solid #ff9800",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{
                  width: 44, height: 44, borderRadius: 14, background: "linear-gradient(135deg, #fff3e0, #ffe0b2)",
                  display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22,
                }}>
                  {MED_TYPES.find((t) => t.id === r.medType)?.emoji || "💊"}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 16, fontWeight: 800, color: "#333" }}>{r.medName}</div>
                  <div style={{ fontSize: 12, color: "#e65100", fontWeight: 600 }}>⏰ {formatTime(r.time)} — Take now!</div>
                </div>
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
                <button onClick={() => onMarkDose(r.medId, r.time, "taken")} style={{
                  flex: 2, padding: "12px", borderRadius: 14, border: "none", cursor: "pointer",
                  background: "linear-gradient(135deg, #2e7d32, #43a047)", color: "#fff", fontWeight: 800, fontSize: 14,
                  boxShadow: "0 4px 12px rgba(46,125,50,0.3)",
                }}>
                  ✅ Took It
                </button>
                <button onClick={() => onMarkDose(r.medId, r.time, "skipped")} style={{
                  flex: 1, padding: "12px", borderRadius: 14, border: "2px solid #e0e0e0", cursor: "pointer",
                  background: "#fff", color: "#888", fontWeight: 700, fontSize: 14,
                }}>
                  Skip
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Today's Schedule */}
      <div style={{ padding: "16px 16px 0" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div style={{ fontSize: 17, fontWeight: 800, color: "#1b5e20" }}>Today's Schedule</div>
          {todayDoses.length > 0 && (
            <button onClick={() => onNav("schedule")} style={{
              background: "none", border: "none", cursor: "pointer", fontSize: 13, color: "#43a047", fontWeight: 700,
            }}>View All →</button>
          )}
        </div>
        {todayDoses.length === 0 ? (
          <div style={{
            background: "#fff", borderRadius: 20, padding: "40px 24px", textAlign: "center",
            boxShadow: "0 2px 12px rgba(0,0,0,0.04)",
          }}>
            <svg width="64" height="64" viewBox="0 0 64 64" style={{ opacity: 0.4 }}>
              <rect x="18" y="8" width="28" height="48" rx="6" fill="none" stroke="#aaa" strokeWidth="2.5"/>
              <rect x="24" y="22" width="16" height="3" rx="1.5" fill="#ccc"/>
              <rect x="24" y="30" width="12" height="3" rx="1.5" fill="#ccc"/>
              <rect x="24" y="38" width="14" height="3" rx="1.5" fill="#ccc"/>
              <circle cx="32" cy="14" r="2" fill="#ccc"/>
            </svg>
            <div style={{ fontSize: 16, fontWeight: 700, color: "#555", marginTop: 12 }}>No medicines yet</div>
            <div style={{ fontSize: 13, color: "#999", marginTop: 4 }}>Add your first medicine to get started</div>
            <button onClick={() => onNav("add")} style={{
              marginTop: 16, padding: "10px 24px", borderRadius: 12, border: "none", cursor: "pointer",
              background: "linear-gradient(135deg, #2e7d32, #43a047)", color: "#fff", fontWeight: 700, fontSize: 14,
              boxShadow: "0 4px 12px rgba(46,125,50,0.3)",
            }}>+ Add Medicine</button>
          </div>
        ) : (
          todayDoses.map((dose) => {
            const done = logs.some((l) => l.medId === dose.medId && l.time === dose.time && l.date === todayStr);
            const skipped = logs.some((l) => l.medId === dose.medId && l.time === dose.time && l.date === todayStr && l.status === "skipped");
            const now = new Date();
            const [h, m] = dose.time.split(":").map(Number);
            const isCurrent = Math.abs(now.getHours() * 60 + now.getMinutes() - (h * 60 + m)) <= 30;

            return (
              <div key={dose.medId + dose.time} style={{
                display: "flex", alignItems: "center", gap: 14, padding: "14px 16px",
                background: "#fff", borderRadius: 16, marginBottom: 8,
                boxShadow: isCurrent && !done ? "0 4px 16px rgba(46,125,50,0.12)" : "0 1px 4px rgba(0,0,0,0.04)",
                border: isCurrent && !done ? "2px solid #66bb6a" : "1px solid #f0f0f0",
                opacity: done ? 0.6 : 1, transition: "all 0.3s",
                borderLeft: done ? (skipped ? "4px solid #ff9800" : "4px solid #43a047") : isCurrent ? "4px solid #66bb6a" : "4px solid #e0e0e0",
              }}>
                <div style={{
                  width: 42, height: 42, borderRadius: 12,
                  background: done ? "#e8f5e9" : isCurrent ? "#f1f8e9" : "#fafafa",
                  display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0,
                }}>
                  {done ? (skipped ? "⏭️" : "✅") : (MED_TYPES.find((t) => t.id === dose.medType)?.emoji || "💊")}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 15, fontWeight: 700, color: done ? "#999" : "#333", textDecoration: done ? "line-through" : "none" }}>
                    {dose.medName}
                  </div>
                  <div style={{ fontSize: 12, color: "#aaa", marginTop: 2 }}>
                    {formatTime(dose.time)} · {FREQUENCY_OPTIONS.find((f) => f.id === dose.med.frequency)?.code || ""} · {FOOD_OPTIONS.find((f) => f.id === dose.med.foodTiming)?.label || ""}
                  </div>
                </div>
                {!done && (
                  <button onClick={() => onMarkDose(dose.medId, dose.time, "taken")} style={{
                    padding: "10px 16px", borderRadius: 12, border: "none", cursor: "pointer",
                    background: "linear-gradient(135deg, #2e7d32, #43a047)", color: "#fff", fontWeight: 700, fontSize: 13,
                    boxShadow: "0 2px 8px rgba(46,125,50,0.3)",
                  }}>
                    Take
                  </button>
                )}
              </div>
            );
          })
        )}
      </div>

      {/* Bottom Navigation */}
      <div style={{
        position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)",
        width: "100%", maxWidth: 430, background: "#fff",
        display: "flex", padding: "6px 8px 14px", borderRadius: "20px 20px 0 0",
        boxShadow: "0 -4px 24px rgba(0,0,0,0.08)", zIndex: 100,
      }}>
        {[
          { id: "home", icon: "🏠", label: "Home" },
          { id: "medicines", icon: "💊", label: "Meds" },
          { id: "add", icon: "➕", label: "Add", isMain: true },
          { id: "schedule", icon: "📅", label: "Schedule" },
          { id: "badges", icon: "🏆", label: "Badges" },
        ].map((tab) => (
          <button key={tab.id} onClick={() => onNav(tab.id)} style={{
            flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
            background: tab.isMain ? "linear-gradient(135deg, #1b5e20, #43a047)" : "transparent",
            border: "none", cursor: "pointer", padding: tab.isMain ? "8px 0" : "6px 0",
            borderRadius: tab.isMain ? 18 : 8,
            marginTop: tab.isMain ? -24 : 0,
            boxShadow: tab.isMain ? "0 6px 20px rgba(27,94,32,0.4)" : "none",
          }}>
            <span style={{ fontSize: tab.isMain ? 26 : 20 }}>{tab.icon}</span>
            <span style={{ fontSize: 9, fontWeight: 700, color: tab.isMain ? "#fff" : "#aaa", letterSpacing: 0.3 }}>{tab.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

//  ADD MEDICINE SCREEN — Single-page intuitive form
// ═══════════════════════════════════════════════════════════════
function AddMedicineScreen({ onAdd, onBack }) {
  const [med, setMed] = useState({ name: "", type: "tablet", frequency: "bd", foodTiming: "after", duration: "" });
  const [showFreqPicker, setShowFreqPicker] = useState(false);
  const [section, setSection] = useState("form"); // "form" or "review"
  const nameRef = useRef(null);

  const selectedFreq = FREQUENCY_OPTIONS.find((f) => f.id === med.frequency);
  const canSubmit = med.name.trim().length >= 2;

  // Group frequencies for cleaner display
  const freqGroups = [
    { title: "Common", items: FREQUENCY_OPTIONS.filter((f) => ["od", "bd", "tds", "qds", "hs", "prn"].includes(f.id)) },
    { title: "Others", items: FREQUENCY_OPTIONS.filter((f) => ["q6h", "q8h", "q12h", "eod", "weekly", "stat"].includes(f.id)) },
  ];

  if (section === "review") {
    return (
      <div style={{
        minHeight: "100vh", display: "flex", flexDirection: "column",
        padding: "20px 20px 24px",
        background: "linear-gradient(180deg, #e8f5e9 0%, #fff 100%)",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
          <button onClick={() => setSection("form")} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer" }}>←</button>
          <h1 style={{ fontSize: 22, fontWeight: 900, color: "#1b5e20", margin: 0 }}>Confirm Medicine</h1>
        </div>

        <div style={{ flex: 1 }}>
          <div style={{
            background: "#fff", borderRadius: 20, padding: 24, marginBottom: 16,
            boxShadow: "0 2px 16px rgba(0,0,0,0.06)", border: "1px solid #e8f5e9",
          }}>
            <div style={{ textAlign: "center", marginBottom: 20 }}>
              <span style={{ fontSize: 48 }}>{MED_TYPES.find((t) => t.id === med.type)?.emoji || "💊"}</span>
              <div style={{ fontSize: 22, fontWeight: 900, color: "#1b5e20", marginTop: 8 }}>{med.name}</div>
            </div>
            {[
              ["Type", MED_TYPES.find((t) => t.id === med.type)?.label],
              ["Frequency", `${selectedFreq?.code} — ${selectedFreq?.label}`],
              ["Timings", selectedFreq?.times.length > 0 ? selectedFreq.times.map(formatTime).join(", ") : "As needed"],
              ["Food", FOOD_OPTIONS.find((f) => f.id === med.foodTiming)?.label],
              ["Duration", med.duration || "Ongoing"],
            ].map(([k, v]) => (
              <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "12px 0", borderBottom: "1px solid #f5f5f5" }}>
                <span style={{ fontSize: 14, color: "#888" }}>{k}</span>
                <span style={{ fontSize: 14, fontWeight: 700, color: "#333", textAlign: "right", maxWidth: "60%" }}>{v}</span>
              </div>
            ))}
          </div>

          <div style={{
            padding: "14px 18px", background: "#e8f5e9", borderRadius: 16,
            display: "flex", alignItems: "center", gap: 12,
          }}>
            <span style={{ fontSize: 28 }}>🎮</span>
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#2e7d32" }}>+15 XP Reward!</div>
              <div style={{ fontSize: 12, color: "#558b2f" }}>You'll earn XP for adding this medicine</div>
            </div>
          </div>
        </div>

        <button onClick={() => onAdd(med)} style={{
          width: "100%", padding: "18px", marginTop: 20, fontSize: 18, fontWeight: 800,
          borderRadius: 16, border: "none", cursor: "pointer",
          background: "linear-gradient(135deg, #2e7d32, #43a047)",
          color: "#fff", boxShadow: "0 4px 20px rgba(46,125,50,0.4)",
        }}>
          Confirm & Add 💊
        </button>
      </div>
    );
  }

  return (
    <div style={{
      minHeight: "100vh", display: "flex", flexDirection: "column",
      padding: "20px 20px 24px",
      background: "linear-gradient(180deg, #e8f5e9 0%, #fff 100%)",
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
        <button onClick={onBack} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer" }}>←</button>
        <h1 style={{ fontSize: 22, fontWeight: 900, color: "#1b5e20", margin: 0 }}>Add Medicine</h1>
      </div>

      <div style={{ flex: 1, overflowY: "auto", paddingBottom: 20 }}>
        {/* Medicine Name */}
        <div style={{ marginBottom: 20 }}>
          <label style={{ fontSize: 13, fontWeight: 700, color: "#1b5e20", marginBottom: 8, display: "block" }}>
            Medicine Name / दवाई का नाम *
          </label>
          <input
            ref={nameRef} type="text" autoFocus value={med.name}
            onChange={(e) => setMed({ ...med, name: e.target.value })}
            placeholder="e.g. Paracetamol, Amoxicillin..."
            style={{
              width: "100%", padding: "14px 18px", fontSize: 16, borderRadius: 14,
              border: "2px solid #c8e6c9", outline: "none", background: "#fff",
              transition: "border-color 0.2s",
            }}
            onFocus={(e) => e.target.style.borderColor = "#43a047"}
            onBlur={(e) => e.target.style.borderColor = "#c8e6c9"}
          />
        </div>

        {/* Medicine Type — horizontal scroll chips */}
        <div style={{ marginBottom: 20 }}>
          <label style={{ fontSize: 13, fontWeight: 700, color: "#1b5e20", marginBottom: 8, display: "block" }}>
            Type / प्रकार
          </label>
          <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4 }}>
            {MED_TYPES.map((t) => (
              <button key={t.id} onClick={() => setMed({ ...med, type: t.id })} style={{
                padding: "10px 16px", borderRadius: 24, border: med.type === t.id ? "2px solid #43a047" : "2px solid #e0e0e0",
                background: med.type === t.id ? "#e8f5e9" : "#fff", cursor: "pointer",
                display: "flex", alignItems: "center", gap: 6, whiteSpace: "nowrap",
                transition: "all 0.2s", flexShrink: 0,
              }}>
                <span style={{ fontSize: 18 }}>{t.emoji}</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: med.type === t.id ? "#2e7d32" : "#555" }}>{t.label}</span>
              </button>
            ))}
          </div>
        </div>

        {/* Frequency Selector */}
        <div style={{ marginBottom: 20 }}>
          <label style={{ fontSize: 13, fontWeight: 700, color: "#1b5e20", marginBottom: 8, display: "block" }}>
            Frequency / कितनी बार
          </label>
          <button onClick={() => setShowFreqPicker(!showFreqPicker)} style={{
            width: "100%", padding: "14px 18px", borderRadius: 14, cursor: "pointer",
            border: "2px solid #c8e6c9", background: "#fff", textAlign: "left",
            display: "flex", justifyContent: "space-between", alignItems: "center",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{
                background: "#1b5e20", color: "#fff", padding: "4px 10px", borderRadius: 8,
                fontSize: 14, fontWeight: 800, letterSpacing: 0.5,
              }}>
                {selectedFreq?.code}
              </span>
              <div>
                <div style={{ fontSize: 15, fontWeight: 700, color: "#333" }}>{selectedFreq?.label}</div>
                <div style={{ fontSize: 11, color: "#888" }}>
                  {selectedFreq?.times.length > 0 ? selectedFreq.times.map(formatTime).join(", ") : "No fixed time"}
                </div>
              </div>
            </div>
            <span style={{ fontSize: 18, color: "#888", transform: showFreqPicker ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s" }}>▼</span>
          </button>

          {/* Frequency Dropdown */}
          {showFreqPicker && (
            <div style={{
              marginTop: 8, background: "#fff", borderRadius: 16, border: "1px solid #e0e0e0",
              boxShadow: "0 8px 32px rgba(0,0,0,0.1)", overflow: "hidden", maxHeight: 350, overflowY: "auto",
            }}>
              {freqGroups.map((group) => (
                <div key={group.title}>
                  <div style={{ padding: "10px 16px 4px", fontSize: 11, fontWeight: 800, color: "#888", textTransform: "uppercase", letterSpacing: 1 }}>
                    {group.title}
                  </div>
                  {group.items.map((f) => (
                    <button key={f.id} onClick={() => { setMed({ ...med, frequency: f.id }); setShowFreqPicker(false); }} style={{
                      width: "100%", padding: "12px 16px", border: "none", cursor: "pointer",
                      background: med.frequency === f.id ? "#e8f5e9" : "transparent",
                      display: "flex", alignItems: "center", gap: 12, textAlign: "left",
                      borderBottom: "1px solid #f5f5f5", transition: "background 0.15s",
                    }}>
                      <span style={{
                        background: med.frequency === f.id ? "#1b5e20" : "#f0f0f0",
                        color: med.frequency === f.id ? "#fff" : "#555",
                        padding: "3px 8px", borderRadius: 6, fontSize: 12, fontWeight: 800,
                        minWidth: 50, textAlign: "center",
                      }}>
                        {f.code}
                      </span>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 14, fontWeight: 600, color: "#333" }}>{f.label}</div>
                        <div style={{ fontSize: 11, color: "#999" }}>
                          {f.labelHi}{f.times.length > 0 ? ` · ${f.times.map(formatTime).join(", ")}` : ""}
                        </div>
                      </div>
                      {med.frequency === f.id && <span style={{ color: "#43a047", fontSize: 18 }}>✓</span>}
                    </button>
                  ))}
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Food Timing — 3 chips in a row */}
        <div style={{ marginBottom: 20 }}>
          <label style={{ fontSize: 13, fontWeight: 700, color: "#1b5e20", marginBottom: 8, display: "block" }}>
            Meal Timing / खाने के साथ
          </label>
          <div style={{ display: "flex", gap: 8 }}>
            {FOOD_OPTIONS.map((f) => (
              <button key={f.id} onClick={() => setMed({ ...med, foodTiming: f.id })} style={{
                flex: 1, padding: "14px 8px", borderRadius: 14, cursor: "pointer",
                border: med.foodTiming === f.id ? "2px solid #43a047" : "2px solid #e8e8e8",
                background: med.foodTiming === f.id ? "#e8f5e9" : "#fff",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 4,
                transition: "all 0.2s",
              }}>
                <span style={{ fontSize: 22 }}>{f.emoji}</span>
                <span style={{ fontSize: 12, fontWeight: 700, color: med.foodTiming === f.id ? "#2e7d32" : "#555" }}>{f.label}</span>
                <span style={{ fontSize: 10, color: "#999" }}>{f.labelHi}</span>
              </button>
            ))}
          </div>
        </div>

        {/* Duration — quick pick + custom */}
        <div style={{ marginBottom: 20 }}>
          <label style={{ fontSize: 13, fontWeight: 700, color: "#1b5e20", marginBottom: 8, display: "block" }}>
            Duration / अवधि
          </label>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
            {["3 days", "5 days", "7 days", "10 days", "14 days", "1 month", "Ongoing"].map((d) => (
              <button key={d} onClick={() => setMed({ ...med, duration: d === "Ongoing" ? "" : d })} style={{
                padding: "8px 14px", borderRadius: 20, cursor: "pointer",
                border: (d === "Ongoing" ? !med.duration : med.duration === d) ? "2px solid #43a047" : "2px solid #e8e8e8",
                background: (d === "Ongoing" ? !med.duration : med.duration === d) ? "#e8f5e9" : "#fff",
                fontSize: 13, fontWeight: 600,
                color: (d === "Ongoing" ? !med.duration : med.duration === d) ? "#2e7d32" : "#666",
                transition: "all 0.2s",
              }}>
                {d}
              </button>
            ))}
          </div>
          <input
            type="text" value={med.duration}
            onChange={(e) => setMed({ ...med, duration: e.target.value })}
            placeholder="Or type custom duration..."
            style={{
              width: "100%", padding: "12px 16px", fontSize: 14, borderRadius: 12,
              border: "1px solid #e0e0e0", outline: "none", background: "#fafafa",
            }}
            onFocus={(e) => e.target.style.borderColor = "#43a047"}
            onBlur={(e) => e.target.style.borderColor = "#e0e0e0"}
          />
        </div>
      </div>

      {/* Submit Button */}
      <button
        onClick={() => canSubmit && setSection("review")}
        disabled={!canSubmit}
        style={{
          width: "100%", padding: "18px", fontSize: 17, fontWeight: 800,
          borderRadius: 16, border: "none", cursor: canSubmit ? "pointer" : "default",
          background: canSubmit ? "linear-gradient(135deg, #2e7d32, #43a047)" : "#c8e6c9",
          color: "#fff", boxShadow: canSubmit ? "0 4px 20px rgba(46,125,50,0.4)" : "none",
          transition: "all 0.3s",
        }}
      >
        Review & Add 💊 +15 XP
      </button>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  MEDICINE LIST SCREEN
// ═══════════════════════════════════════════════════════════════
function MedicineListScreen({ medicines, onDelete, onBack }) {
  const [confirmId, setConfirmId] = useState(null);

  return (
    <div style={{ minHeight: "100vh", background: "#f5f7f5" }}>
      <div style={{
        background: "linear-gradient(160deg, #0d3311, #1b5e20 40%, #2e7d32)", padding: "20px 20px 24px",
        position: "relative", overflow: "hidden",
      }}>
        <div style={{ position: "absolute", top: -30, right: -30, width: 140, height: 140, borderRadius: "50%", background: "rgba(255,255,255,0.04)" }} />
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <button onClick={onBack} style={{ background: "rgba(255,255,255,0.1)", border: "none", fontSize: 18, cursor: "pointer", color: "#fff", width: 36, height: 36, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center" }}>←</button>
          <h1 style={{ fontSize: 22, fontWeight: 900, color: "#fff", margin: 0 }}>My Medicines</h1>
          <span style={{
            marginLeft: "auto", background: "rgba(255,255,255,0.15)", padding: "4px 12px",
            borderRadius: 10, fontSize: 13, fontWeight: 700, color: "#a5d6a7",
          }}>{medicines.length}</span>
        </div>
      </div>

      <div style={{ padding: "20px 16px" }}>
        {medicines.length === 0 ? (
          <div style={{ textAlign: "center", padding: 40 }}>
            <svg width="64" height="64" viewBox="0 0 64 64" style={{ opacity: 0.3 }}>
              <rect x="18" y="8" width="28" height="48" rx="6" fill="none" stroke="#aaa" strokeWidth="2.5"/>
              <rect x="24" y="22" width="16" height="3" rx="1.5" fill="#ccc"/>
              <rect x="24" y="30" width="12" height="3" rx="1.5" fill="#ccc"/>
            </svg>
            <div style={{ fontSize: 15, color: "#888", marginTop: 12 }}>No medicines added yet</div>
          </div>
        ) : (
          medicines.map((med) => {
            const freq = FREQUENCY_OPTIONS.find((f) => f.id === med.frequency);
            return (
              <div key={med.id} style={{
                background: "#fff", borderRadius: 20, padding: 18, marginBottom: 12,
                boxShadow: "0 2px 12px rgba(0,0,0,0.05)", border: "1px solid #f0f0f0",
              }}>
                <div style={{ display: "flex", alignItems: "flex-start", gap: 14 }}>
                  <div style={{
                    width: 48, height: 48, borderRadius: 16,
                    background: "linear-gradient(135deg, #e8f5e9, #c8e6c9)",
                    display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, flexShrink: 0,
                  }}>
                    {MED_TYPES.find((t) => t.id === med.type)?.emoji || "💊"}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 17, fontWeight: 800, color: "#1b5e20" }}>{med.name}</div>
                    <div style={{ display: "flex", gap: 6, marginTop: 6, flexWrap: "wrap" }}>
                      <span style={{
                        background: "#1b5e20", color: "#fff", padding: "2px 8px", borderRadius: 6,
                        fontSize: 11, fontWeight: 800,
                      }}>{freq?.code || "—"}</span>
                      <span style={{ background: "#f5f5f5", padding: "2px 8px", borderRadius: 6, fontSize: 11, fontWeight: 600, color: "#666" }}>
                        {FOOD_OPTIONS.find((f) => f.id === med.foodTiming)?.label}
                      </span>
                      {med.duration && (
                        <span style={{ background: "#f5f5f5", padding: "2px 8px", borderRadius: 6, fontSize: 11, fontWeight: 600, color: "#666" }}>
                          {med.duration}
                        </span>
                      )}
                    </div>
                  </div>
                  <button onClick={() => setConfirmId(med.id)} style={{
                    background: "#fff5f5", border: "1px solid #ffcdd2", cursor: "pointer", fontSize: 12, color: "#e53935",
                    padding: "6px 10px", borderRadius: 10, fontWeight: 700,
                  }}>🗑️</button>
                </div>
                {(freq?.times || []).length > 0 && (
                  <div style={{ display: "flex", gap: 6, marginTop: 12, marginLeft: 62, flexWrap: "wrap" }}>
                    {freq.times.map((t) => (
                      <span key={t} style={{
                        background: "#f8fdf8", padding: "5px 12px", borderRadius: 10,
                        fontSize: 12, fontWeight: 600, color: "#43a047", border: "1px solid #e8f5e9",
                      }}>
                        {formatTime(t)}
                      </span>
                    ))}
                  </div>
                )}
              </div>
            );
          })
        )}
      </div>

      {/* Delete confirmation dialog */}
      {confirmId && (
        <div style={{
          position: "fixed", inset: 0, zIndex: 9998, display: "flex", alignItems: "center", justifyContent: "center",
          background: "rgba(0,0,0,0.45)", animation: "fadeIn 0.2s ease",
        }} onClick={() => setConfirmId(null)}>
          <div onClick={(e) => e.stopPropagation()} style={{
            background: "#fff", borderRadius: 24, padding: "28px 24px", textAlign: "center",
            boxShadow: "0 20px 60px rgba(0,0,0,0.3)", animation: "popIn 0.3s ease",
            width: "85%", maxWidth: 320,
          }}>
            <div style={{ fontSize: 40, marginBottom: 8 }}>🗑️</div>
            <div style={{ fontSize: 18, fontWeight: 800, color: "#333", marginBottom: 6 }}>Delete Medicine?</div>
            <div style={{ fontSize: 14, color: "#888", marginBottom: 20, lineHeight: 1.4 }}>
              This will remove <strong>{medicines.find((m) => m.id === confirmId)?.name}</strong> and cannot be undone.
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setConfirmId(null)} style={{
                flex: 1, padding: "14px", borderRadius: 14, border: "2px solid #e0e0e0", cursor: "pointer",
                background: "#fff", color: "#555", fontWeight: 700, fontSize: 15,
              }}>Cancel</button>
              <button onClick={() => { onDelete(confirmId); setConfirmId(null); }} style={{
                flex: 1, padding: "14px", borderRadius: 14, border: "none", cursor: "pointer",
                background: "linear-gradient(135deg, #e53935, #ff5252)", color: "#fff", fontWeight: 800, fontSize: 15,
                boxShadow: "0 4px 12px rgba(229,57,53,0.3)",
              }}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  BADGES SCREEN
// ═══════════════════════════════════════════════════════════════
function BadgesScreen({ badges: earnedBadges, stats, onBack }) {
  const pct = Math.round((earnedBadges.length / BADGES.length) * 100);
  const circ = 2 * Math.PI * 40;
  return (
    <div style={{ minHeight: "100vh", background: "#f5f7f5" }}>
      {/* Header with trophy SVG */}
      <div style={{
        background: "linear-gradient(160deg, #0d3311, #1b5e20 40%, #2e7d32)", padding: "20px 20px 32px",
        position: "relative", overflow: "hidden",
      }}>
        <div style={{ position: "absolute", top: -30, right: -30, width: 140, height: 140, borderRadius: "50%", background: "rgba(255,255,255,0.04)" }} />
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
          <button onClick={onBack} style={{ background: "rgba(255,255,255,0.1)", border: "none", fontSize: 18, cursor: "pointer", color: "#fff", width: 36, height: 36, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center" }}>←</button>
          <h1 style={{ fontSize: 22, fontWeight: 900, color: "#fff", margin: 0 }}>Achievements</h1>
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: 20 }}>
          <div style={{ position: "relative", width: 96, height: 96, flexShrink: 0 }}>
            <svg width="96" height="96" viewBox="0 0 96 96">
              <defs>
                <linearGradient id="badgeRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stopColor="#fdd835" />
                  <stop offset="100%" stopColor="#ff9800" />
                </linearGradient>
              </defs>
              <circle cx="48" cy="48" r="40" fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="8" />
              <circle cx="48" cy="48" r="40" fill="none" stroke="url(#badgeRingGrad)" strokeWidth="8"
                strokeDasharray={circ} strokeDashoffset={circ * (1 - pct / 100)}
                strokeLinecap="round" transform="rotate(-90 48 48)"
                style={{ transition: "stroke-dashoffset 0.8s ease" }}
              />
            </svg>
            <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
              <div style={{ fontSize: 28, fontWeight: 900, color: "#fdd835" }}>{earnedBadges.length}</div>
              <div style={{ fontSize: 9, color: "#a5d6a7", fontWeight: 700 }}>/{BADGES.length}</div>
            </div>
          </div>
          <div>
            <div style={{ fontSize: 14, color: "#a5d6a7", fontWeight: 600 }}>Collection Progress</div>
            <div style={{ fontSize: 28, fontWeight: 900, color: "#fff" }}>{pct}%</div>
            <div style={{ fontSize: 12, color: "#81c784", marginTop: 2 }}>
              {BADGES.length - earnedBadges.length === 0 ? "All unlocked! 🎉" : `${BADGES.length - earnedBadges.length} more to unlock`}
            </div>
          </div>
        </div>
      </div>

      <div style={{ padding: "20px 16px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        {BADGES.map((badge) => {
          const earned = earnedBadges.includes(badge.id);
          return (
            <div key={badge.id} style={{
              background: "#fff", borderRadius: 20, padding: "20px 14px", textAlign: "center",
              boxShadow: earned ? "0 4px 20px rgba(46,125,50,0.12)" : "0 1px 4px rgba(0,0,0,0.04)",
              border: earned ? "2px solid #66bb6a" : "1px solid #f0f0f0",
              position: "relative", overflow: "hidden", transition: "all 0.3s",
            }}>
              {earned && <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: "linear-gradient(90deg, #43a047, #69f0ae)" }} />}
              <div style={{
                width: 56, height: 56, borderRadius: 18, margin: "0 auto 10px",
                background: earned ? "linear-gradient(135deg, #e8f5e9, #c8e6c9)" : "#f5f5f5",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 30,
              }}>
                {earned ? badge.icon : "🔒"}
              </div>
              <div style={{ fontSize: 14, fontWeight: 800, color: earned ? "#1b5e20" : "#bbb" }}>
                {badge.name}
              </div>
              <div style={{ fontSize: 11, color: earned ? "#888" : "#ccc", marginTop: 4, lineHeight: 1.3 }}>{badge.desc}</div>
              {earned && <div style={{ marginTop: 8, fontSize: 10, fontWeight: 700, color: "#43a047", background: "#e8f5e9", padding: "3px 10px", borderRadius: 8, display: "inline-block" }}>UNLOCKED</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  SCHEDULE SCREEN — Full day timeline
// ═══════════════════════════════════════════════════════════════
function ScheduleScreen({ medicines, logs, onBack }) {
  const todayStr = today();
  const allDoses = [];

  for (const med of medicines) {
    const freq = FREQUENCY_OPTIONS.find((f) => f.id === med.frequency);
    if (!freq) continue;
    for (const time of freq.times) {
      const [h, m] = time.split(":").map(Number);
      const done = logs.some((l) => l.medId === med.id && l.time === time && l.date === todayStr);
      const status = done ? logs.find((l) => l.medId === med.id && l.time === time && l.date === todayStr)?.status : null;
      allDoses.push({ hour: h, minute: m, time, med, done, status });
    }
  }
  allDoses.sort((a, b) => a.hour * 60 + a.minute - (b.hour * 60 + b.minute));

  const now = new Date();
  const nowMinutes = now.getHours() * 60 + now.getMinutes();
  const totalDone = allDoses.filter((d) => d.done && d.status === "taken").length;
  const totalSkipped = allDoses.filter((d) => d.done && d.status === "skipped").length;
  const totalPending = allDoses.filter((d) => !d.done).length;

  // Group doses by time slot
  const timeSlots = {};
  allDoses.forEach((d) => {
    const key = d.time;
    if (!timeSlots[key]) timeSlots[key] = [];
    timeSlots[key].push(d);
  });

  return (
    <div style={{ minHeight: "100vh", background: "#f5f7f5" }}>
      <div style={{
        background: "linear-gradient(160deg, #0d3311, #1b5e20 40%, #2e7d32)", padding: "20px 20px 24px",
        position: "relative", overflow: "hidden",
      }}>
        <div style={{ position: "absolute", top: -30, right: -30, width: 140, height: 140, borderRadius: "50%", background: "rgba(255,255,255,0.04)" }} />
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
          <button onClick={onBack} style={{ background: "rgba(255,255,255,0.1)", border: "none", fontSize: 18, cursor: "pointer", color: "#fff", width: 36, height: 36, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center" }}>←</button>
          <h1 style={{ fontSize: 22, fontWeight: 900, color: "#fff", margin: 0 }}>Day Schedule</h1>
        </div>

        {/* Summary pills */}
        <div style={{ display: "flex", gap: 8 }}>
          {[
            { val: totalDone, label: "Taken", bg: "rgba(105,240,174,0.2)", color: "#69f0ae" },
            { val: totalSkipped, label: "Skipped", bg: "rgba(255,183,77,0.2)", color: "#ffb74d" },
            { val: totalPending, label: "Pending", bg: "rgba(255,255,255,0.1)", color: "#fff" },
          ].map((p) => (
            <div key={p.label} style={{
              flex: 1, padding: "10px 8px", borderRadius: 14, background: p.bg,
              textAlign: "center",
            }}>
              <div style={{ fontSize: 22, fontWeight: 900, color: p.color }}>{p.val}</div>
              <div style={{ fontSize: 10, color: "rgba(255,255,255,0.6)", fontWeight: 600, marginTop: 2 }}>{p.label}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ padding: "20px 16px" }}>
        {Object.entries(timeSlots).map(([time, doses]) => {
          const [h, m] = time.split(":").map(Number);
          const slotMinutes = h * 60 + m;
          const isNow = Math.abs(nowMinutes - slotMinutes) <= 30;
          const isPast = nowMinutes > slotMinutes + 30;
          const allDone = doses.every((d) => d.done);

          return (
            <div key={time} style={{ display: "flex", gap: 14, marginBottom: 16 }}>
              {/* Time column with line */}
              <div style={{ width: 56, flexShrink: 0, display: "flex", flexDirection: "column", alignItems: "center" }}>
                <div style={{
                  padding: "6px 8px", borderRadius: 10,
                  background: isNow ? "#1b5e20" : allDone ? "#e8f5e9" : "#fff",
                  fontSize: 12, fontWeight: 800,
                  color: isNow ? "#fff" : allDone ? "#43a047" : "#888",
                  textAlign: "center", width: "100%",
                  boxShadow: isNow ? "0 2px 8px rgba(27,94,32,0.3)" : "none",
                }}>
                  {formatTime(time)}
                </div>
                <div style={{
                  width: 2, flex: 1, marginTop: 4,
                  background: isNow ? "linear-gradient(180deg, #43a047, transparent)" : "#e0e0e0",
                }} />
              </div>

              {/* Dose cards */}
              <div style={{ flex: 1 }}>
                {doses.map((dose) => (
                  <div key={dose.med.id + dose.time} style={{
                    background: "#fff", borderRadius: 16, padding: "14px 16px", marginBottom: 8,
                    boxShadow: isNow && !dose.done ? "0 4px 16px rgba(46,125,50,0.1)" : "0 1px 4px rgba(0,0,0,0.04)",
                    borderLeft: dose.done
                      ? (dose.status === "taken" ? "4px solid #43a047" : "4px solid #ff9800")
                      : isNow ? "4px solid #66bb6a" : "4px solid #e0e0e0",
                    display: "flex", alignItems: "center", gap: 12,
                    opacity: isPast && dose.done ? 0.7 : 1,
                  }}>
                    <div style={{
                      width: 40, height: 40, borderRadius: 12, flexShrink: 0,
                      background: dose.done
                        ? (dose.status === "taken" ? "#e8f5e9" : "#fff3e0")
                        : "#fafafa",
                      display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20,
                    }}>
                      {dose.done ? (dose.status === "taken" ? "✅" : "⏭️") : (MED_TYPES.find((t) => t.id === dose.med.type)?.emoji || "💊")}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{
                        fontSize: 15, fontWeight: 700,
                        color: dose.done ? (dose.status === "taken" ? "#43a047" : "#e65100") : "#333",
                        textDecoration: dose.done ? "line-through" : "none",
                      }}>
                        {dose.med.name}
                      </div>
                      <div style={{ fontSize: 11, color: "#aaa", marginTop: 2 }}>
                        {FREQUENCY_OPTIONS.find((f) => f.id === dose.med.frequency)?.code || ""} · {FOOD_OPTIONS.find((f) => f.id === dose.med.foodTiming)?.label || ""}
                      </div>
                    </div>
                    {dose.done && (
                      <span style={{
                        fontSize: 10, fontWeight: 700, padding: "3px 8px", borderRadius: 6,
                        background: dose.status === "taken" ? "#e8f5e9" : "#fff3e0",
                        color: dose.status === "taken" ? "#2e7d32" : "#e65100",
                      }}>
                        {dose.status === "taken" ? "DONE" : "SKIP"}
                      </span>
                    )}
                  </div>
                ))}
              </div>
            </div>
          );
        })}

        {allDoses.length === 0 && (
          <div style={{ textAlign: "center", padding: 40 }}>
            <svg width="64" height="64" viewBox="0 0 64 64" style={{ opacity: 0.3 }}>
              <circle cx="32" cy="32" r="28" fill="none" stroke="#aaa" strokeWidth="2"/>
              <line x1="32" y1="16" x2="32" y2="32" stroke="#aaa" strokeWidth="2.5" strokeLinecap="round"/>
              <line x1="32" y1="32" x2="44" y2="38" stroke="#aaa" strokeWidth="2" strokeLinecap="round"/>
            </svg>
            <div style={{ fontSize: 15, color: "#888", marginTop: 12 }}>No doses scheduled today</div>
          </div>
        )}
      </div>
    </div>
  );
}
